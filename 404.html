<style>
:root {
  --bg: #ffffff;
  --fg: #1a1a1a;
  --muted: #666;
  --accent: #ff5252;
  --border: #e5e5e5;
  --code-bg: #f6f8fa;
  --link: #0066cc;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #121212;
    --fg: #e8e8e8;
    --muted: #9a9a9a;
    --accent: #ff6b6b;
    --border: #2a2a2a;
    --code-bg: #1d1d1d;
    --link: #79b8ff;
  }
}
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg);
  color: var(--fg);
  font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  margin: 0;
  padding: 0;
}
.wrap {
  max-width: 760px;
  margin: 0 auto;
  padding: 32px 22px 80px;
}
header.site {
  border-bottom: 1px solid var(--border);
  padding-bottom: 16px;
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
header.site .brand {
  font-weight: 800;
  letter-spacing: -0.01em;
  font-size: 18px;
  color: var(--fg);
  text-decoration: none;
}
header.site nav a {
  color: var(--muted);
  text-decoration: none;
  margin-left: 16px;
  font-size: 14px;
}
header.site nav a:hover { color: var(--accent); }
h1 { font-size: 28px; line-height: 1.25; margin: 0 0 8px; letter-spacing: -0.01em; }
h2 { font-size: 22px; line-height: 1.3;  margin: 36px 0 10px; letter-spacing: -0.01em; }
h3 { font-size: 18px; line-height: 1.3;  margin: 26px 0 8px;  letter-spacing: -0.005em; }
h4 { font-size: 16px; line-height: 1.3;  margin: 22px 0 6px; }
p, ul, ol { margin: 12px 0; }
ul, ol { padding-left: 24px; }
li { margin: 4px 0; }
strong { font-weight: 700; }
a { color: var(--link); }
hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
table {
  border-collapse: collapse;
  width: 100%;
  margin: 16px 0;
  font-size: 14px;
}
th, td {
  border: 1px solid var(--border);
  padding: 8px 12px;
  text-align: left;
  vertical-align: top;
}
th { background: var(--code-bg); font-weight: 600; }
code {
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 4px;
  font: 13px/1.4 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
pre {
  background: var(--code-bg);
  padding: 14px 16px;
  border-radius: 6px;
  overflow-x: auto;
}
pre code { background: none; padding: 0; }
blockquote {
  border-left: 3px solid var(--accent);
  margin: 16px 0;
  padding: 4px 14px;
  color: var(--muted);
}
footer.site {
  border-top: 1px solid var(--border);
  margin-top: 48px;
  padding-top: 18px;
  font-size: 13px;
  color: var(--muted);
}
footer.site a { color: var(--muted); }
</style>
</head>
